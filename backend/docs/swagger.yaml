      - recommendations
  /books:
    get:
      consumes:
      - application/json
      description: Search and filter books from MongoDB catalog with live stock from
        PostgreSQL
      parameters:
      - description: Full-text search query
        in: query
        name: search
        type: string
      - description: Filter by author name
        in: query
        name: author
        type: string
      - description: Filter by publisher
        in: query
        name: publisher
        type: string
      - description: Filter by publish year
        in: query
        name: year
        type: integer
      - description: Minimum price
        in: query
        name: min_price
        type: number
      - description: Maximum price
        in: query
        name: max_price
        type: number
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.BookListResponse'
