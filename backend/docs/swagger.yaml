basePath: /api/v1
definitions:
  domain.AddToCartRequest:
    properties:
      book_id:
        type: string
      quantity:
        minimum: 1
        type: integer
    required:
    - book_id
    - quantity
    type: object
  domain.Address:
    properties:
      address_line:
        type: string
      alias_id:
        type: string
      city:
        type: string
      created_at:
        type: string
      district:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      receiver_name:
        type: string
      ward:
        type: string
    type: object
  domain.BestSellerBook:
    properties:
      book_id:
        type: string
      title:
        type: string
      total_sold:
        type: number
    type: object
  domain.BookAuthor:
    properties:
      author_id:
        type: string
      author_name:
        type: string
      slug:
        type: string
    type: object
  domain.BookCategory:
    properties:
      category_id:
        type: string
    type: object
  domain.BookDetail:
    properties:
      authors:
        items:
          $ref: '#/definitions/domain.BookAuthor'
        type: array
      category:
        $ref: '#/definitions/domain.BookCategory'
      created_at:
        type: string
      detail_description:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/domain.BookImage'
        type: array
      name:
        type: string
      price:
        type: number
      pricing:
        $ref: '#/definitions/domain.BookPricing'
      product_status:
        type: string
      series:
        $ref: '#/definitions/domain.BookSeries'
      short_description:
        type: string
      stock_quantity:
        type: integer
      tags:
        items:
          $ref: '#/definitions/domain.BookTag'
        type: array
    type: object
  domain.BookImage:
    properties:
      alt:
        type: string
      is_primary:
        type: boolean
      url:
        type: string
    type: object
  domain.BookListResponse:
    properties:
      books:
        items:
          $ref: '#/definitions/domain.BookDetail'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  domain.BookPricing:
    properties:
      price:
        type: number
    type: object
  domain.BookSeries:
    properties:
      sequence_no:
        type: integer
      series_id:
        type: string
      series_name:
        type: string
    type: object
  domain.BookTag:
    properties:
      tag_id:
        type: string
      tag_name:
        type: string
    type: object
  domain.BuyNowRequest:
    properties:
      book_id:
        type: string
      quantity:
        minimum: 1
        type: integer
    required:
    - book_id
    - quantity
    type: object
  domain.BuyNowResponse:
    properties:
      session_id:
        type: string
    type: object
  domain.CartItem:
    properties:
      book_id:
        type: string
      name:
        type: string
      price:
        type: number
      quantity:
        type: integer
    type: object
  domain.CartResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.CartItem'
        type: array
      total_price:
        type: number
    type: object
  domain.Category:
    properties:
      category_name:
        type: string
      created_at:
        type: string
      id:
        type: string
      parent_category:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  domain.CategoryListResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/domain.Category'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  domain.CheckoutRequest:
    properties:
      address_id:
        description: |-
          AddressID is the alias_id UUID of the delivery address; resolved to the internal
          int64 FK before the PostgreSQL transaction.
        type: string
      note:
        type: string
      session_id:
        description: for Buy-Now flow
        type: string
    type: object
  domain.CreateAddressRequest:
    properties:
      address_line:
        type: string
      city:
        type: string
      district:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      receiver_name:
        type: string
      ward:
        type: string
    required:
    - address_line
    - city
    - phone
    - receiver_name
    type: object
  domain.CreateBookRequest:
    properties:
      authors:
        items:
          $ref: '#/definitions/domain.BookAuthor'
        minItems: 1
        type: array
      category:
        $ref: '#/definitions/domain.BookCategory'
      detail_description:
        type: string
      images:
        items:
          $ref: '#/definitions/domain.BookImage'
        type: array
      name:
        type: string
      pricing:
        $ref: '#/definitions/domain.BookPricing'
      product_status:
        type: string
      series:
        $ref: '#/definitions/domain.BookSeries'
      short_description:
        type: string
      stock_quantity:
        minimum: 0
        type: integer
      tags:
        items:
          $ref: '#/definitions/domain.BookTag'
        type: array
    required:
    - authors
    - name
    - pricing
    - stock_quantity
    type: object
  domain.CreateCategoryRequest:
    properties:
      category_name:
        type: string
      parent_category:
        type: string
      slug:
        type: string
    required:
    - category_name
    - slug
    type: object
  domain.DeactivateUserRequest:
    properties:
      is_active:
        type: boolean
    type: object
  domain.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  domain.MostViewedBook:
    properties:
      book_id:
        type: string
      title:
        type: string
      view_count:
        type: number
    type: object
  domain.Order:
    properties:
      alias_id:
        type: string
      created_at:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.OrderItem'
        type: array
      note:
        type: string
      status:
        $ref: '#/definitions/domain.OrderStatus'
      total_amount:
        type: number
    type: object
  domain.OrderItem:
    properties:
      book_id:
        type: string
      name:
        type: string
      quantity:
        type: integer
      unit_price:
        type: number
    type: object
  domain.OrderListResponse:
    properties:
      orders:
        items:
          $ref: '#/definitions/domain.Order'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  domain.OrderStatus:
    enum:
    - pending
    - confirmed
    - packing
    - shipping
    - completed
    - cancelled
    type: string
    x-enum-varnames:
    - OrderStatusPending
    - OrderStatusConfirmed
    - OrderStatusPacking
    - OrderStatusShipping
    - OrderStatusCompleted
    - OrderStatusCancelled
  domain.OrderStatusHistory:
    properties:
      alias_id:
        type: string
      changed_at:
        type: string
      changed_by_admin_alias_id:
        type: string
      new_status:
        type: string
      note:
        type: string
      old_status:
        type: string
    type: object
  domain.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
    required:
    - email
    - full_name
    - password
    - phone
    type: object
  domain.SalesSummary:
    properties:
      date_from:
        type: string
      date_to:
        type: string
      total_orders:
        type: integer
      total_revenue:
        type: number
    type: object
  domain.SeriesBook:
    properties:
      already_bought:
        type: boolean
      book_id:
        type: string
      title:
        type: string
      volume_order:
        type: integer
    type: object
  domain.Shipment:
    properties:
      alias_id:
        type: string
      carrier:
        type: string
      created_at:
        type: string
      delivered_at:
        type: string
      shipped_at:
        type: string
      status:
        $ref: '#/definitions/domain.ShipmentStatus'
      tracking_number:
        type: string
    type: object
  domain.ShipmentStatus:
    enum:
    - pending
    - shipped
    - delivered
    type: string
    x-enum-varnames:
    - ShipmentStatusPending
    - ShipmentStatusShipped
    - ShipmentStatusDelivered
  domain.SimilarBook:
    properties:
      book_id:
        type: string
      cover_url:
        type: string
      score:
        type: number
      title:
        type: string
    type: object
  domain.UpdateAddressRequest:
    properties:
      address_line:
        type: string
      city:
        type: string
      district:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      receiver_name:
        type: string
      ward:
        type: string
    type: object
  domain.UpdateBookRequest:
    properties:
      authors:
        items:
          $ref: '#/definitions/domain.BookAuthor'
        type: array
      category:
        $ref: '#/definitions/domain.BookCategory'
      detail_description:
        type: string
      images:
        items:
          $ref: '#/definitions/domain.BookImage'
        type: array
      name:
        type: string
      pricing:
        $ref: '#/definitions/domain.BookPricing'
      product_status:
        type: string
      series:
        $ref: '#/definitions/domain.BookSeries'
      short_description:
        type: string
      tags:
        items:
          $ref: '#/definitions/domain.BookTag'
        type: array
    type: object
  domain.UpdateCartItemRequest:
    properties:
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  domain.UpdateCategoryRequest:
    properties:
      category_name:
        type: string
      parent_category:
        type: string
      slug:
        type: string
    type: object
  domain.UpdateOrderStatusRequest:
    properties:
      note:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/domain.OrderStatus'
        enum:
        - pending
        - confirmed
        - packing
        - shipping
        - completed
        - cancelled
    required:
    - status
    type: object
  domain.UpdateProfileRequest:
    properties:
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        type: string
    type: object
  domain.UpdateShipmentDetailsRequest:
    properties:
      carrier:
        type: string
      tracking_no:
        type: string
    required:
    - carrier
    - tracking_no
    type: object
  domain.UpdateShipmentStatusRequest:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/domain.ShipmentStatus'
        enum:
        - pending
        - shipped
        - delivered
    required:
    - status
    type: object
  domain.UpdateStockRequest:
    properties:
      stock_quantity:
        minimum: 0
        type: integer
    required:
    - stock_quantity
    type: object
  domain.UserInfo:
    properties:
      alias_id:
        type: string
      email:
        type: string
      full_name:
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/domain.UserRole'
    type: object
  domain.UserListResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      users:
        items:
          $ref: '#/definitions/domain.UserInfo'
        type: array
    type: object
  domain.UserRole:
    enum:
    - user
    - admin
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleAdmin
  server.errorResponse:
    properties:
      error:
        type: string
    type: object
  server.successResponse:
    properties:
      data: {}
    type: object
host: localhost:8080
info:
  contact:
    email: support@bookstore.local
    name: API Support
  description: Polyglot persistence bookstore backend — PostgreSQL · MongoDB · Neo4j
    · Redis.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: HCMUS Bookstore API
  version: "2.0"
paths:
  /admin/analytics/best-sellers:
    get:
      description: Return sales ranking data from Redis
      parameters:
      - description: Number of books
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.BestSellerBook'
            type: array
      security:
      - BearerAuth: []
      summary: 'Admin: Best sellers analytics'
      tags:
      - admin-analytics
  /admin/analytics/sales:
    get:
      description: Return total revenue and order count for a date range
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.SalesSummary'
      security:
      - BearerAuth: []
      summary: 'Admin: Sales summary'
      tags:
      - admin-analytics
  /admin/books:
    get:
      description: Return a paginated list of all books with stock info
      parameters:
      - description: Search query
        in: query
        name: search
        type: string
      - description: Filter by author
        in: query
        name: author
        type: string
      - description: Filter by publisher
        in: query
        name: publisher
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.BookListResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: List books'
      tags:
      - admin-books
    post:
      consumes:
      - application/json
      description: Create a new book across MongoDB, PostgreSQL, and Neo4j
      parameters:
      - description: Book payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateBookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.BookDetail'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Create book'
      tags:
      - admin-books
  /admin/books/{id}:
    delete:
      description: Soft-delete a book by marking it inactive in PostgreSQL and Neo4j
      parameters:
      - description: Book MongoDB ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Delete book'
      tags:
      - admin-books
    put:
      consumes:
      - application/json
      description: Update book metadata and re-sync Neo4j graph
      parameters:
      - description: Book MongoDB ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Update book'
      tags:
      - admin-books
  /admin/books/{id}/stock:
    patch:
      consumes:
      - application/json
      description: Set absolute stock quantity for a book (Atomic Transaction)
      parameters:
      - description: Book MongoDB ID
        in: path
        name: id
        required: true
        type: string
      - description: New stock quantity
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Update stock'
      tags:
      - admin-books
  /admin/categories:
    get:
      description: Return a paginated list of categories for admin management
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CategoryListResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: List categories'
      tags:
      - admin-categories
    post:
      consumes:
      - application/json
      description: Create a new category in MongoDB and sync to Neo4j graph
      parameters:
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Category'
      security:
      - BearerAuth: []
      summary: 'Admin: Create category'
      tags:
      - admin-categories
  /admin/categories/{id}:
    delete:
      description: Delete a category from MongoDB and detach from Neo4j graph
      parameters:
      - description: Category MongoDB ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Delete category'
      tags:
      - admin-categories
    put:
      consumes:
      - application/json
      description: Update category metadata and re-sync Neo4j graph
      parameters:
      - description: Category MongoDB ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Category'
      security:
      - BearerAuth: []
      summary: 'Admin: Update category'
      tags:
      - admin-categories
  /admin/orders:
    get:
      description: Return a paginated list of all orders with optional status filter
      parameters:
      - description: Filter by order status
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.OrderListResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: List orders'
      tags:
      - admin-orders
  /admin/orders/{id}:
    get:
      description: Return full order details for any order
      parameters:
      - description: Order Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Order'
      security:
      - BearerAuth: []
      summary: 'Admin: Get order'
      tags:
      - admin-orders
  /admin/orders/{id}/history:
    get:
      description: Return the full history of status transitions for an order
      parameters:
      - description: Order Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.OrderStatusHistory'
            type: array
      security:
      - BearerAuth: []
      summary: 'Admin: Get order audit trail'
      tags:
      - admin-orders
  /admin/orders/{id}/shipment:
    get:
      description: Return shipment details for a specific order
      parameters:
      - description: Order Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Shipment'
      security:
      - BearerAuth: []
      summary: 'Admin: Get shipment by order'
      tags:
      - admin-shipments
  /admin/orders/{id}/status:
    patch:
      consumes:
      - application/json
      description: Transition an order to a new state and log audit trail
      parameters:
      - description: Order Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Status update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateOrderStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Update order status'
      tags:
      - admin-orders
  /admin/shipments/{id}:
    get:
      description: Return full shipment details by its alias ID
      parameters:
      - description: Shipment Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Shipment'
      security:
      - BearerAuth: []
      summary: 'Admin: Get shipment'
      tags:
      - admin-shipments
    put:
      consumes:
      - application/json
      description: Update carrier and tracking number for a shipment
      parameters:
      - description: Shipment Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Details update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateShipmentDetailsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Update shipment details'
      tags:
      - admin-shipments
  /admin/shipments/{id}/status:
    patch:
      consumes:
      - application/json
      description: Transition a shipment to a new state
      parameters:
      - description: Shipment Alias ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Status update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateShipmentStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.successResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Update shipment status'
      tags:
      - admin-shipments
  /admin/users:
    get:
      description: Return a paginated list of all registered users
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.UserListResponse'
      security:
