          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Search books
      tags:
      - books
  /books/{id}:
    get:
      consumes:
      - application/json
      description: Return full book metadata from MongoDB and stock from PostgreSQL
      parameters:
      - description: Book MongoDB ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
